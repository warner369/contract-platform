 name = "contract-platform"
main = ".open-next/worker.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
routes = [
  { pattern = "contract-platform.dubussy.com", custom_domain = true }
]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "contract-platform-db"
database_id = "a24eba72-d3d4-4d89-a26a-e673fca893e0"

[observability]
[observability.logs]
enabled = true
invocation_logs = true